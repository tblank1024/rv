# Broker logs go to stdout so Docker's json-file rotation owns them
log_dest stdout
persistence false

# Each listener has its own auth settings (must precede the listeners)
per_listener_settings true

# Main listener — all RV services authenticate with MQTT_USER/MQTT_PASS
# (credentials in docker/.env, hashes in mosquitto.passwd — both gitignored)
listener 1883
allow_anonymous false
password_file /mosquitto/config/mosquitto.passwd

# Websocket listener for the browser dashboard: anonymous but read-only
# (websocket.acl) so clients on RV WiFi cannot publish commands or spoof data
listener 9001
protocol websockets
allow_anonymous true
acl_file /mosquitto/config/websocket.acl
