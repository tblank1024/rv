  # MQTT Broker (Required - always enabled)
  mqtt:
    container_name: broker
    network_mode: host
    image: eclipse-mosquitto:latest
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health/probe -m 1 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /home/tblank/code/tblank1024/rv/docker/mqtt/config:/mosquitto/config
      - /home/tblank/code/tblank1024/rv/docker/mqtt/data:/mosquitto/data
      - /home/tblank/code/tblank1024/rv/docker/mqtt/log:/mosquitto/log
      - /home/tblank/code/tblank1024/rv/docker/watcher/log:/watcher/log

  # CAN Bus RV-C Monitoring
  rvc2mqtt:
    build:
      context: /home/tblank/code/linuxkidd/rvc-monitor-py
      dockerfile: Dockerfile
    container_name: can
    network_mode: host
    image: rvc2mqtt:latest
    restart: always
    depends_on:
      mqtt:
        condition: service_healthy

  # Bluetooth Battery Monitoring - LEGACY BLEAK APPROACH (COMMENTED OUT)
  # bat2mqtt_bleak:
  #   build:
  #     context: /home/tblank/code/tblank1024/rv/bat2mqtt
  #     dockerfile: Dockerfile
  #   container_name: battery_bleak
  #   image: bat2mqtt:bleak
  #   network_mode: host
  #   depends_on:
  #     - mqtt
  #   volumes:
  #     - /run/dbus:/run/dbus:rw
  #     - /var/run/dbus:/var/run/dbus:rw
  #   devices:
  #     - /dev/bus/usb:/dev/bus/usb
  #   restart: always
  #   privileged: true
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_ADMIN
  #   environment:
  #     - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket

  # Bluetooth Battery Monitoring - gatttool implementation
  # Uses direct gatttool subprocess calls for reliable BLE connection
  bat2mqtt:
    build:
      context: /home/tblank/code/tblank1024/rv/bat2mqtt
      dockerfile: Dockerfile
    container_name: battery
    image: bat2mqtt:gatttool
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /run/dbus:/run/dbus:ro
      - /sys/class/bluetooth:/sys/class/bluetooth:ro
      - /sys/devices:/sys/devices:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: "always"  # Re-enabled - duplication issue solved with simplified implementation
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      - DEBUG_LEVEL=0
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    depends_on:
      mqtt:
        condition: service_healthy

  # TireLinc TPMS Monitoring (Bluetooth GATT via USB dongle hci2)
  tirelinc:
    build:
      context: /home/tblank/code/tblank1024/rv/tirelinc
      dockerfile: Dockerfile
    container_name: tirelinc
    image: tirelinc:latest
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - /run/dbus:/run/dbus:rw
      - /var/run/dbus:/var/run/dbus:rw
      - /sys/class/bluetooth:/sys/class/bluetooth:ro
      - /sys/devices:/sys/devices:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: "always"
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8

  # Victron Solar Monitoring (ve.direct)
  ve.direct:
    build:
      context: /home/tblank/code/tblank1024/rv/ve.direct
      dockerfile: Dockerfile
    container_name: solar
    network_mode: host
    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0
    restart: always
    image: solar:latest
    privileged: false
    depends_on:
      mqtt:
        condition: service_healthy

 # GPIO Alarm System
  alarm:
    build:
      context: /home/tblank/code/tblank1024/rv/alarm
      dockerfile: Dockerfile
    container_name: alarm
    network_mode: host
    restart: always
    image: alarm:latest
    privileged: true
    environment:
      - GPIOZERO_PIN_FACTORY=lgpio
    volumes:
      - /dev:/dev
    depends_on:
      mqtt:
        condition: service_healthy

  # Web Dashboard Interface
  webserver:
    environment:
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - KASA_DISCOVERY_TIMEOUT=10
      - KASA_DEFAULT_TIMEOUT=10
      - DISABLE_KASA=false
      - KASA_IP=${KASA_IP}
      - KASA_USERNAME=${KASA_USERNAME}
      - KASA_PASSWORD=${KASA_PASSWORD}
      - PYTHONPATH=/usr/share/zoneinfo
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - PST8PDT=America/Los_Angeles
      - WIFI_BRIDGE_HOST=10.10.0.1
      - WIFI_BRIDGE_PORT=12345
      - COMPOSE_FILE=/home/tblank/code/tblank1024/rv/docker/docker-compose.yml
    build:
      context: /home/tblank/code/tblank1024/rv/webserver
      dockerfile: Dockerfile
      additional_contexts:
        rv: /home/tblank/code/tblank1024/rv
    container_name: webserver
    image: webserver:latest
    network_mode: host
    pid: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
      - SYS_ADMIN
      - DAC_OVERRIDE
    volumes:
      - /sys/class/net:/sys/class/net:ro
      - /sys/bus/usb:/sys/bus/usb:rw
      - /sys/devices:/sys/devices:ro
      - /dev/bus/usb:/dev/bus/usb:rw
      - /run/dbus:/run/dbus:rw
      - /var/run/dbus:/var/run/dbus:rw
      - /home/tblank/code/tblank1024/rv/alarm:/home/tblank/code/tblank1024/rv/alarm:ro
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/tblank/code/tblank1024/rv/docker:/home/tblank/code/tblank1024/rv/docker:ro
      - /home/tblank/code/tblank1024/rv/webserver/server/synology-password.json:/app/rvsecurity/server/synology-password.json:ro
    devices:
      - /dev/coolgear-hub:/dev/coolgear-hub
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyACM0:/dev/ttyACM0
      - /dev/ttyACM1:/dev/ttyACM1
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      mqtt:
        condition: service_healthy
      rvc2mqtt:
        condition: service_started
  #      alarm:
  #        condition: service_started



  # Data Watcher/Logger
  watcher:
    build:
      context: /home/tblank/code/tblank1024/rv/watcher
      dockerfile: Dockerfile
    container_name: watcher
    network_mode: host
    restart: always
    image: watcher:latest
    privileged: false
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - /home/tblank/code/tblank1024/rv/docker/watcherlogs:/app/watcher/watcherlogs



