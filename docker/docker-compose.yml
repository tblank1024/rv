# =================================================================
# RV Docker stack
#
# All paths are relative to this file (rv/docker/), so the stack runs
# from any checkout. The one external repo (fork of linuxkidd/rvc-monitor-py)
# can be relocated via RVC_MONITOR_DIR in .env; run ./setup-rvc-monitor.sh
# to clone it / verify it is at the pinned commit before building rvc2mqtt.
#
# Optional services use compose profiles instead of comment blocks:
#   docker compose --profile raspap up -d     # RASPAp access point
#   docker compose --profile bleak up -d      # legacy bleak battery monitor
# Credentials live in .env (gitignored); see .env.example.
# =================================================================

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # MQTT Broker (required - everything depends on it)
  mqtt:
    container_name: mqtt
    network_mode: host
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    mem_limit: 128m
    logging: *logging
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -u \"$$MQTT_USER\" -P \"$$MQTT_PASS\" -t health/probe -m 1 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/data:/mosquitto/data

  # CAN Bus RV-C Monitoring
  rvc2mqtt:
    build:
      context: ${RVC_MONITOR_DIR:-../../../linuxkidd/rvc-monitor-py}
      dockerfile: Dockerfile
    container_name: rvc2mqtt
    network_mode: host
    image: rvc2mqtt:latest
    restart: unless-stopped
    # Python as PID 1 ignores SIGTERM; tini forwards it so stops are fast
    init: true
    mem_limit: 128m
    logging: *logging
    # DEBUG_LEVEL=5 writes every CAN frame to disk — leave at 0 to avoid flash wear
    environment:
      - DEBUG_LEVEL=0
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
    depends_on:
      mqtt:
        condition: service_healthy

  # Bluetooth Battery Monitoring (gatttool implementation)
  battery:
    build:
      context: ../bat2mqtt
      dockerfile: Dockerfile
    container_name: battery
    image: battery:latest
    network_mode: host
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *logging
    volumes:
      - /run/dbus:/run/dbus:ro
      - /sys/class/bluetooth:/sys/class/bluetooth:ro
      - /sys/devices:/sys/devices:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    # De-privileged: gatttool/hciconfig need NET_ADMIN/NET_RAW for HCI
    # sockets; SYS_ADMIN kept for BlueZ adapter resets
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - DEBUG_LEVEL=0
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    depends_on:
      mqtt:
        condition: service_healthy

  # Legacy bleak-based battery monitor (enable with --profile bleak)
  battery_bleak:
    profiles: ["bleak"]
    build:
      context: ../bat2mqtt
      dockerfile: Dockerfile-bleak
    container_name: battery_bleak
    image: battery:bleak
    network_mode: host
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *logging
    volumes:
      - /run/dbus:/run/dbus:rw
      - /var/run/dbus:/var/run/dbus:rw
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
    depends_on:
      mqtt:
        condition: service_healthy

  # TireLinc TPMS Monitoring (Bluetooth GATT via USB dongle)
  tirelinc:
    build:
      context: ../tirelinc
      dockerfile: Dockerfile
    container_name: tirelinc
    image: tirelinc:latest
    network_mode: host
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *logging
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - /run/dbus:/run/dbus:rw
      - /var/run/dbus:/var/run/dbus:rw
      - /sys/class/bluetooth:/sys/class/bluetooth:ro
      - /sys/devices:/sys/devices:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    # De-privileged: bleak talks to host bluetoothd over D-Bus, no raw
    # device access needed beyond the mounts above
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8

  # Victron Solar Monitoring (ve.direct)
  solar:
    build:
      context: ../ve.direct
      dockerfile: Dockerfile
    container_name: solar
    image: solar:latest
    network_mode: host
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *logging
    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0
    privileged: false
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - PYTHONUNBUFFERED=1
    depends_on:
      mqtt:
        condition: service_healthy

  # GPIO Alarm System
  alarm:
    build:
      context: ../alarm
      dockerfile: Dockerfile
    container_name: alarm
    network_mode: host
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *logging
    image: alarm:latest
    # De-privileged: gpiozero/lgpio only needs the two GPIO character devices
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - PYTHONUNBUFFERED=1
    depends_on:
      mqtt:
        condition: service_healthy

  # Web Dashboard Interface
  webserver:
    build:
      context: ../webserver
      dockerfile: Dockerfile
      additional_contexts:
        rv: ..
    container_name: webserver
    image: webserver:latest
    network_mode: host
    pid: host
    restart: unless-stopped
    init: true
    mem_limit: 512m
    logging: *logging
    # privileged + pid:host + docker.sock: manages containers, USB hub power,
    # host shutdown, and the USB modem — document/trim in Phase 4 hardening.
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
      - SYS_ADMIN
      - DAC_OVERRIDE
    environment:
      - TZ=America/Los_Angeles
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - PYTHONUNBUFFERED=1
      - KASA_DISCOVERY_TIMEOUT=10
      - KASA_DEFAULT_TIMEOUT=10
      - DISABLE_KASA=false
      - KASA_IP=${KASA_IP}
      - KASA_USERNAME=${KASA_USERNAME}
      - KASA_PASSWORD=${KASA_PASSWORD}
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - WIFI_BRIDGE_HOST=10.10.0.1
      - WIFI_BRIDGE_PORT=12345
      - COMPOSE_FILE=/home/tblank/code/tblank1024/rv/docker/docker-compose.yml
    volumes:
      - /sys/class/net:/sys/class/net:ro
      - /sys/bus/usb:/sys/bus/usb:rw
      - /sys/devices:/sys/devices:ro
      - /dev/bus/usb:/dev/bus/usb:rw
      - /run/dbus:/run/dbus:rw
      - /var/run/dbus:/var/run/dbus:rw
      - ../alarm:/home/tblank/code/tblank1024/rv/alarm:ro
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/home/tblank/code/tblank1024/rv/docker:ro
      - ../webserver/server/synology-password.json:/app/rvsecurity/server/synology-password.json:ro
    devices:
      - /dev/coolgear-hub:/dev/coolgear-hub
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyACM0:/dev/ttyACM0
      - /dev/ttyACM1:/dev/ttyACM1
    healthcheck:
      # Port 8000 is the FastAPI server; port 80 is RASPAp's native GUI,
      # which answers 302 to everything and made this check pass vacuously
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      mqtt:
        condition: service_healthy
      rvc2mqtt:
        condition: service_started

  # Data Watcher/Logger
  watcher:
    build:
      context: ../watcher
      dockerfile: Dockerfile
    container_name: watcher
    network_mode: host
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *logging
    image: watcher:latest
    privileged: false
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - PYTHONUNBUFFERED=1
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - ./watcherlogs:/app/watcher/watcherlogs

  # RASPAp access point (enable with --profile raspap; runs natively today)
  raspap:
    profiles: ["raspap"]
    container_name: raspap
    image: ghcr.io/raspap/raspap-docker:latest
    ports:
      - "8081:8081"
    privileged: true
    network_mode: host
    cgroup: host  # required on ARM devices
    restart: unless-stopped
    logging: *logging
    environment:
      - RASPAP_SSID=${RASPAP_SSID}
      - RASPAP_SSID_PASS=${RASPAP_SSID_PASS}
      - RASPAP_COUNTRY=GB
      - RASPAP_WEBGUI_USER=${RASPAP_WEBGUI_USER}
      - RASPAP_WEBGUI_PASS=${RASPAP_WEBGUI_PASS}
      - RASPAP_WEBGUI_PORT=80
    cap_add:
      - SYS_ADMIN
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
